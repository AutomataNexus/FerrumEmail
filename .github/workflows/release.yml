name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build TUI binary (Linux only)
        if: contains(matrix.target, 'linux')
        run: cargo build --release --target ${{ matrix.target }} -p ferrum-email-tui
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ferrum-tui dist/
          cd dist
          tar czf ferrum-tui-${{ matrix.target }}.tar.gz ferrum-tui
          sha256sum ferrum-tui-${{ matrix.target }}.tar.gz > ferrum-tui-${{ matrix.target }}.tar.gz.sha256

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ferrum-tui-${{ matrix.target }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrum-tui-${{ matrix.target }}
          path: |
            dist/ferrum-tui-${{ matrix.target }}.tar.gz
            dist/ferrum-tui-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates (in dependency order)
        run: |
          cargo publish -p ferrum-email-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 30
          cargo publish -p ferrum-email-components --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 30
          cargo publish -p ferrum-email-render --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 30
          cargo publish -p ferrum-email-send --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 30
          cargo publish -p ferrum-email --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
